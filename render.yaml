services:
  - type: web
    name: codecroupier-site
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    pullRequestPreviewsEnabled: false
    routes:
      # SPA fallback so client-side routes like /dashboard or /login
      # don't 404 on a hard refresh or direct link.
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
